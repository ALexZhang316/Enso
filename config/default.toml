[provider]
provider = "kimi"
baseUrl = "https://api.moonshot.cn/v1"
model = "kimi-k2.5"

[expression]
density = "standard"
structuredFirst = false

reportingGranularity = "plan-level"

[permissions]
readOnlyDefault = true
requireConfirmationForWrites = true
requireDoubleConfirmationForExternal = true

[modeDefaults]
defaultMode = "default"

[modeDefaults.retrievalByMode]
default = false
"deep-dialogue" = false
decision = true
research = true
